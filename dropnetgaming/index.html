<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNG CS2 Match Hub</title>
  <style>
    :root {
      --bg: #030303;
      --panel: rgba(8, 9, 13, 0.86);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.28);
      --text: #ffffff;
      --muted: #a6a6ad;
      --soft: rgba(255, 255, 255, 0.06);
      --soft-2: rgba(255, 255, 255, 0.11);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    button, input, textarea, select { font-family: inherit; }
    button { cursor: pointer; }

    .app-shell {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 35% 10%, rgba(255,255,255,.10), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(90,100,145,.12), transparent 32%),
        linear-gradient(135deg, #030303 0%, #111218 52%, #020207 100%);
      position: relative;
    }

    .app-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: .36;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 86%);
    }

    .topbar {
      height: 64px;
      display: grid;
      grid-template-columns: 270px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 0 16px;
      background: rgba(0,0,0,.82);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 20;
    }

    .brand {
      height: 58px;
      border: 0;
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: #030303;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-weight: 1000;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text {
      text-align: left;
      line-height: .9;
    }

    .brand-text b {
      display: block;
      font-size: 30px;
      font-weight: 1000;
      letter-spacing: -.06em;
    }

    .brand-text span {
      display: block;
      margin-top: 5px;
      color: #d9d9df;
      font-size: 12px;
      letter-spacing: .42em;
      font-weight: 1000;
    }

    .top-nav {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .top-nav::-webkit-scrollbar { display: none; }

    .top-link, .small-action, .notif {
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      color: #fff;
      border-radius: 999px;
      min-height: 40px;
      padding: 0 17px;
      font-size: 14px;
      font-weight: 1000;
      white-space: nowrap;
      transition: .18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .top-link:hover, .small-action:hover, .notif:hover {
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.34);
      transform: translateY(-1px);
    }

    .top-link.active {
      border-color: rgba(255,255,255,.70);
      background: rgba(255,255,255,.13);
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: max-content;
    }

    .small-action.admin { background: rgba(255,255,255,.14); }
    .small-action.danger {
      color: #ffb4b4;
      border-color: rgba(255,100,100,.36);
    }

    .layout {
      height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 270px 1fr 64px;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(0,0,0,.76);
      backdrop-filter: blur(16px);
      overflow-y: auto;
      padding: 22px 14px;
    }

    .sidebar::-webkit-scrollbar, .page-content::-webkit-scrollbar { width: 10px; }
    .sidebar::-webkit-scrollbar-thumb, .page-content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.45);
      border-radius: 999px;
    }

    .large-logo {
      width: 100%;
      min-height: 205px;
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      margin-bottom: 24px;
      padding: 0;
    }

    .large-logo img {
      width: 220px;
      max-width: 100%;
      border-radius: 28px;
      display: block;
    }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-link {
      min-height: 54px;
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.035);
      color: #d8d8df;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 1000;
      text-align: left;
      transition: .18s ease;
    }

    .side-link:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.25);
      color: #fff;
      transform: translateX(3px);
    }

    .side-link.active {
      border-color: rgba(255,255,255,.58);
      background: rgba(255,255,255,.10);
      color: #fff;
    }

    .side-icon {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.055);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 18px;
    }

    .side-divider {
      height: 1px;
      background: rgba(255,255,255,.10);
      margin: 14px 0;
    }

    .page-content {
      overflow-y: auto;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.10), transparent 30%),
        linear-gradient(90deg, rgba(0,0,0,.68), rgba(10,12,20,.75), rgba(0,0,0,.70));
    }

    .rightbar {
      border-left: 1px solid var(--line);
      background: rgba(0,0,0,.80);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 18px 8px;
    }

    .rightbar button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      transition: .18s ease;
    }

    .rightbar button:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.40);
      transform: translateY(-2px);
    }

    .page {
      width: min(1360px, calc(100% - 48px));
      margin: 0 auto;
      padding: 44px 0 80px;
    }

    .hero {
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 30% 0%, rgba(255,255,255,.10), transparent 30%),
        linear-gradient(135deg, rgba(0,0,0,.62), rgba(13,16,29,.74));
      border-radius: 28px;
      padding: 42px;
      box-shadow: 0 0 55px rgba(255,255,255,.08);
    }

    .kicker {
      color: #aaaab3;
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: .45em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 12px 0;
      font-size: clamp(42px, 5.2vw, 74px);
      line-height: .95;
      font-weight: 1000;
      letter-spacing: -.055em;
    }

    .hero p, .muted {
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(135deg, #fff, #9a9a9a);
      color: #080808;
      padding: 0 22px;
      font-weight: 1000;
      font-size: 16px;
      transition: .18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 26px rgba(255,255,255,.18);
    }

    .btn.dark {
      color: #fff;
      background: rgba(255,255,255,.07);
    }

    .grid {
      display: grid;
      gap: 22px;
      margin-top: 26px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(0,0,0,.58), rgba(17,20,34,.70));
      border-radius: 26px;
      padding: 26px;
      box-shadow: 0 0 30px rgba(0,0,0,.28);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 26px;
      letter-spacing: -.04em;
    }

    .home-grid {
      display: grid;
      grid-template-columns: 1.2fr .9fr;
      gap: 22px;
      margin-top: 26px;
    }

    .profile-strip {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 28px;
      align-items: center;
      margin-top: 24px;
    }

    .level-circle {
      width: 128px;
      height: 128px;
      border-radius: 999px;
      border: 16px solid rgba(255,255,255,.07);
      background: #040404;
      display: grid;
      place-items: center;
      font-size: 52px;
      font-weight: 1000;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
    }

    .progress {
      height: 8px;
      background: rgba(255,255,255,.13);
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress span {
      height: 100%;
      display: block;
      background: linear-gradient(90deg, #fff, #9f9f9f);
      border-radius: 999px;
    }

    .party-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 18px;
      margin-top: 26px;
    }

    .party-card {
      min-height: 210px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.48);
      border-radius: 24px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #b9b9c1;
    }

    .plus {
      display: block;
      font-size: 56px;
      line-height: 1;
      color: #bdbdc6;
    }

    .avatar {
      width: 86px;
      height: 86px;
      border-radius: 999px;
      background: #030303;
      border: 1px solid rgba(255,255,255,.22);
      display: grid;
      place-items: center;
      font-weight: 1000;
      color: #fff;
      margin: 0 auto 16px;
    }

    .queue-panel {
      margin-top: 26px;
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background: rgba(4,5,11,.78);
    }

    .queue-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      padding: 18px 26px;
      border-bottom: 1px solid var(--line);
    }

    .queue-modes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      padding: 26px;
    }

    .mode-card {
      text-align: left;
      min-height: 110px;
      border: 1px solid rgba(255,255,255,.11);
      background: rgba(0,0,0,.40);
      color: #fff;
      border-radius: 18px;
      padding: 18px;
      transition: .18s ease;
    }

    .mode-card:hover {
      border-color: rgba(255,255,255,.35);
      transform: translateY(-2px);
      background: rgba(255,255,255,.06);
    }

    .mode-card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 18px;
    }

    .table th, .table td {
      border-bottom: 1px solid rgba(255,255,255,.10);
      padding: 16px;
      text-align: left;
    }

    .table th {
      color: #d8d8de;
      background: rgba(255,255,255,.06);
    }

    .form {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .input, .textarea, .select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(0,0,0,.45);
      color: #fff;
      border-radius: 16px;
      padding: 15px 16px;
      outline: none;
    }

    .textarea {
      min-height: 140px;
      resize: vertical;
    }

    .match-room-grid {
      display: grid;
      grid-template-columns: 1.2fr .85fr 1.2fr;
      gap: 22px;
      margin-top: 26px;
    }

    .player-row {
      min-height: 70px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.035);
      border-radius: 16px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .avatar-sm {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: #050505;
      border: 1px solid rgba(255,255,255,.20);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 1000;
    }

    .ready {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }

    .score-box {
      margin-top: 28px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.055);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      font-weight: 1000;
    }


    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .action-card {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(0,0,0,.58), rgba(17,20,34,.70));
      border-radius: 24px;
      padding: 22px;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }

    .action-card h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.04em;
    }

    .action-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .mini-stat {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.045);
      border-radius: 18px;
      padding: 14px;
    }

    .mini-stat b {
      display: block;
      font-size: 26px;
      margin-bottom: 4px;
    }

    .mini-stat span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      border-radius: 999px;
      padding: 0 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.055);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .status-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.055);
      color: #fff;
      line-height: 1.55;
    }

    .auto-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .auto-row {
      min-height: 62px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.035);
      border-radius: 16px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .auto-row strong {
      display: block;
    }

    .auto-row span {
      color: var(--muted);
      font-size: 13px;
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .progress.big {
      height: 12px;
    }


    @media (max-width: 1100px) {
      body { overflow: auto; }

      .app-shell {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .topbar {
        grid-template-columns: 1fr;
        height: auto;
        padding: 10px;
      }

      .layout {
        height: auto;
        grid-template-columns: 1fr;
      }

      .sidebar, .rightbar { display: none; }
      .page-content { overflow: visible; }

      .page {
        width: min(100% - 24px, 1100px);
        padding: 24px 0 60px;
      }

      .home-grid,
      .grid-2,
      .grid-3,
      .action-grid,
      .match-room-grid,
      .queue-top,
      .queue-modes {
        grid-template-columns: 1fr;
      }

      .party-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" onclick="go('matchmaking')">
        <span class="brand-logo">
          <img src="public/logo-dng-final.png" alt="DNG" onerror="this.style.display='none'; this.parentElement.textContent='DNG';" />
        </span>

        <span class="brand-text">
          <b>DNG</b>
          <span>CS2</span>
        </span>
      </button>

      <nav class="top-nav" id="topNav"></nav>
      <div class="top-actions" id="topActions"></div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <button class="large-logo" onclick="go('matchmaking')">
          <img src="public/logo-dng-final.png" alt="DNG Logo" onerror="this.style.display='none';" />
        </button>

        <nav class="side-list" id="sideNav"></nav>
      </aside>

      <main class="page-content" id="app"></main>
      <aside class="rightbar" id="rightbar"></aside>
    </div>
  </div>

  <script>
    const STORAGE_USERS = "dng_users_ready_html_v1";
    const STORAGE_SESSION = "dng_session_ready_html_v1";
    const STORAGE_TICKETS = "dng_tickets_ready_html_v1";
    const STORAGE_NEWS = "dng_news_ready_html_v1";
    const STORAGE_MATCHES = "dng_matches_ready_html_v1";
    const STORAGE_QUESTS = "dng_quests_ready_html_v1";

    const topNav = [
      ["matchmaking", "Матчмейкинг"],
      ["play", "Играть"],
      ["match-room", "Комната матча"],
      ["tournaments", "Турниры"],
      ["premium", "Premium"],
      ["teams", "Команды"],
      ["leaderboard", "Лидерборд"],
      ["news", "Новости"],
      ["chat", "Чат"],
      ["faq", "FAQ"]
    ];

    const mainNav = [
      ["search", "Поиск", "⌕"],
      ["friends", "Party Finder", "☷"],
      ["play", "Играть", "▶"],
      ["match-room", "Комната матча", "×"],
      ["premium", "Premium", "♔"],
      ["teams", "Команды", "☷"],
      ["leaderboard", "Лидерборд", "↗"],
      ["news", "Новости", "▣"],
      ["chat", "Чат", "✦"],
      ["quests", "Задания", "☼"],
      ["feedback", "Обратная связь", "▱"]
    ];

    const serviceNav = [
      ["tournaments", "Турниры", "♕"],
      ["rules", "Правила", "◈"],
      ["contacts", "Контакты", "▱"],
      ["privacy", "Политика", "◈"]
    ];

    const routes = [
      "matchmaking", "play", "match-room", "tournaments", "premium", "teams",
      "leaderboard", "news", "chat", "quests", "feedback", "profile", "login",
      "register", "rules", "faq", "contacts", "privacy", "testing",
      "search", "friends", "inventory", "maps", "servers", "anticheat",
      "settings", "stats", "league"
    ];

    const defaultNews = [
      {
        id: 1,
        tag: "CS2",
        title: "Обновление матчмейкинга DNG",
        text: "Добавлена мини-игра перед поиском матча, ELO и история игр."
      },
      {
        id: 2,
        tag: "DNG",
        title: "Новости через админ-панель",
        text: "Администратор может добавлять новости прямо на сайте."
      },
      {
        id: 3,
        tag: "Gaming",
        title: "Steel Wings Arena",
        text: "Новая визуальная тема проекта с тёмным интерфейсом и DNG-логотипом."
      }
    ];

    const defaultQuests = [
      { id: 1, title: "Сыграть 1 матч", type: "matches", goal: 1, progress: 0, reward: 40 },
      { id: 2, title: "Выиграть 1 матч", type: "wins", goal: 1, progress: 0, reward: 60 },
      { id: 3, title: "Получить ELO", type: "elo", goal: 20, progress: 0, reward: 80 }
    ];

    let state = {
      route: getRoute(),
      users: loadUsers(),
      currentUser: readJson(STORAGE_SESSION, null),
      tickets: readJson(STORAGE_TICKETS, []),
      news: readJson(STORAGE_NEWS, defaultNews),
      matches: readJson(STORAGE_MATCHES, []),
      quests: readJson(STORAGE_QUESTS, defaultQuests),
      payments: [],
      chatMessages: [],
      notifications: []
    };


    const API_MODE = location.protocol !== "file:";
    let serverStateReady = !API_MODE;
    let apiSaveTimer = null;

    async function loadServerState() {
      if (!API_MODE) return;

      try {
        const response = await fetch("/api/state", {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
          throw new Error("API state load failed");
        }

        const data = await response.json();

        state.users = Array.isArray(data.users) ? data.users : state.users;
        state.tickets = Array.isArray(data.tickets) ? data.tickets : state.tickets;
        state.news = Array.isArray(data.news) ? data.news : state.news;
        state.matches = Array.isArray(data.matches) ? data.matches : state.matches;
        state.quests = Array.isArray(data.quests) ? data.quests : state.quests;
        state.payments = Array.isArray(data.payments) ? data.payments : state.payments;
        state.chatMessages = Array.isArray(data.chatMessages) ? data.chatMessages : state.chatMessages;

        if (state.currentUser) {
          if (state.currentUser.role === "admin") {
            state.currentUser = null;
            localStorage.removeItem(STORAGE_SESSION);
          } else {
            const freshUser = state.users.find(user => user.username === state.currentUser.username);
            if (freshUser) {
              state.currentUser = normalizeUser(freshUser);
              writeJson(STORAGE_SESSION, state.currentUser);
            }
          }
        }

        serverStateReady = true;
        render();
      } catch (error) {
        console.warn("Render database is not connected yet:", error);
        serverStateReady = true;
      }
    }

    function queueServerSave() {
      if (!API_MODE || !serverStateReady) return;

      window.clearTimeout(apiSaveTimer);

      apiSaveTimer = window.setTimeout(async () => {
        try {
          await fetch("/api/state", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              users: state.users,
              tickets: state.tickets,
              news: state.news,
              matches: state.matches,
              quests: state.quests
            })
          });
        } catch (error) {
          console.warn("Render database save failed:", error);
        }
      }, 350);
    }


    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function loadUsers() {
      const users = readJson(STORAGE_USERS, []);
      return Array.isArray(users) ? users.filter(user => user && user.role !== "admin") : [];
    }

    function saveAll() {
      writeJson(STORAGE_USERS, state.users);
      writeJson(STORAGE_TICKETS, state.tickets);
      writeJson(STORAGE_NEWS, state.news);
      writeJson(STORAGE_MATCHES, state.matches);
      writeJson(STORAGE_QUESTS, state.quests);

      if (state.currentUser) {
        writeJson(STORAGE_SESSION, state.currentUser);
      } else {
        localStorage.removeItem(STORAGE_SESSION);
      }

      queueServerSave();
    }

    function getRoute() {
      const hash = location.hash.replace("#/", "").replace("#", "").split("?")[0].trim();
      if (!hash) return "matchmaking";
      return routes.includes(hash) ? hash : "not-found";
    }

    function go(route) {
      location.hash = "#/" + route;
    }

    function notify(text) {
      state.notifications.unshift({ id: Date.now(), text });
      state.notifications = state.notifications.slice(0, 9);
      renderLayout();
    }

    function normalizeUser(user) {
      const xp = Number(user.xp || 0);

      return {
        username: user.username,
        password: user.password,
        nickname: user.nickname || user.username,
        role: user.role || "user",
        elo: Number(user.elo || 1000),
        level: Math.max(1, Math.floor(xp / 150) + 1),
        wins: Number(user.wins || 0),
        losses: Number(user.losses || 0),
        matches: Number(user.matches || 0),
        xp
      };
    }

    function logout() {
      state.currentUser = null;
      saveAll();
      go("matchmaking");
      render();
    }

    function updateQuest(type, amount) {
      let reward = 0;

      state.quests = state.quests.map(quest => {
        if (quest.type !== type || quest.progress >= quest.goal) {
          return quest;
        }

        const progress = Math.min(quest.goal, quest.progress + amount);

        if (progress >= quest.goal) {
          reward += quest.reward;
        }

        return { ...quest, progress };
      });

      if (reward > 0 && state.currentUser) {
        state.currentUser.xp += reward;
        state.currentUser.level = Math.max(1, Math.floor(state.currentUser.xp / 150) + 1);
        notify("Задание выполнено: +" + reward + " XP");
      }

      saveAll();
    }

      if (!state.currentUser) {
        go("login");
        return;

      const gameWindow = window.open(
        "",
        "dng-cs2-minigame",
        "width=1280,height=760,menubar=no,toolbar=no,location=no,status=no"
      );

      if (!gameWindow) {
        alert("Браузер заблокировал окно игры. Разреши всплывающие окна для сайта.");
        return;
      }

      gameWindow.document.open();
      gameWindow.document.write(getMiniGameHtml());
      gameWindow.document.close();

      notify("Мини-игра открыта в отдельном окне");
    }

    function applyMiniGameResult(payload) {
      if (!payload || payload.type !== "DNG_GAME_RESULT") return;
      if (!state.currentUser) return;

      const eloChange = Number(payload.eloChange || 0);
      const isWin = payload.result === "win";

      state.currentUser.elo = Math.max(100, state.currentUser.elo + eloChange);
      state.currentUser.matches += 1;
      state.currentUser.xp += isWin ? 60 : 25;

      if (isWin) {
        state.currentUser.wins += 1;
      } else {
        state.currentUser.losses += 1;
      }

      state.currentUser.level = Math.max(1, Math.floor(state.currentUser.xp / 150) + 1);

      state.matches.unshift({
        id: Date.now(),
        map: "DNG Aim Mission",
        server: "Browser Mini Game",
        result: isWin ? "Win" : "Lose",
        score: (payload.kills || 0) + " kills",
        eloChange,
        createdAt: payload.createdAt || new Date().toLocaleString("ru-RU")
      });

      state.matches = state.matches.slice(0, 30);

      updateQuest("matches", 1);
      if (isWin) updateQuest("wins", 1);
      if (eloChange > 0) updateQuest("elo", eloChange);

      state.users = state.users.map(user => {
        return user.username === state.currentUser.username ? state.currentUser : user;
      });

      localStorage.removeItem("dng_minigame_result");

      notify(
        "Мини-игра: " +
        (isWin ? "победа" : "поражение") +
        ", " +
        (eloChange > 0 ? "+" : "") +
        eloChange +
        " ELO"
      );

      saveAll();
      render();
    }

    window.addEventListener("message", event => {
      applyMiniGameResult(event.data);
    });

    window.addEventListener("storage", event => {
      if (event.key !== "dng_minigame_result") return;

      try {
        applyMiniGameResult(JSON.parse(event.newValue));
      } catch {}
    });

    function privilegeLabel(user) {

      const labels = {
        premium: "Premium",

        captain: "Капитан",
        moderator: "Модератор",

      return privileges.map(item => labels[item] || item).join(", ");

    function renderPrivilegePills(user) {

      if (!privileges.length) {

      return privileges.map(item => `<span class="small-action">${privilegeLabel({ privileges: [item] })}</span>`).join(" ");

    function safeText(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchChatMessages() {
      const box = document.getElementById("chatMessages");

      if (!box) return;

      if (!API_MODE) {
        box.innerHTML = `
          <div class="player-row">
            <span class="avatar-sm">DN</span>
            <div>
              <b>DNG</b>
              <p class="muted">Чат работает на Render. Локально сообщения не сохраняются.</p>
            </div>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch("/api/chat/messages");
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Chat load failed");
        }

        state.chatMessages = Array.isArray(data.messages) ? data.messages : [];

        box.innerHTML = state.chatMessages.length
          ? state.chatMessages.map(message => `
            <div class="player-row" style="align-items:flex-start;min-height:auto;padding:14px">
              <span class="avatar-sm">${safeText((message.nickname || message.username || "DN").slice(0, 2).toUpperCase())}</span>
              <div style="min-width:0">
                <b>${safeText(message.nickname || message.username || "Гость")}</b>
                <span class="muted"> • ${safeText(message.createdAt || "")}</span>
                <p style="margin:8px 0 0;white-space:pre-wrap;word-break:break-word">${safeText(message.text || "")}</p>
              </div>
            </div>
          `).join("")
          : `<p class="muted">Пока сообщений нет. Напиши первым.</p>`;

        box.scrollTop = box.scrollHeight;
      } catch (error) {
        box.innerHTML = `<p class="muted">Не удалось загрузить чат.</p>`;
      }
    }

    async function sendChatMessage() {
      if (!requireLogin()) return;

      const input = document.getElementById("chatInput");
      const text = input.value.trim();

      if (!text) {
        alert("Напиши сообщение");
        return;
      }

      if (text.length > 500) {
        alert("Сообщение слишком длинное. Максимум 500 символов.");
        return;
      }

      try {
        const response = await fetch("/api/chat/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: state.currentUser.username,
            nickname: state.currentUser.nickname || state.currentUser.username,
            text
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          alert(data.error || "Не удалось отправить сообщение");
          return;
        }

        input.value = "";
        await fetchChatMessages();
      } catch (error) {
        alert("Ошибка отправки сообщения");
      }
    }

    async function login() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!username || !password) {
        alert("Заполни логин и пароль");
        return;
      }

      if (API_MODE) {
        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();

          if (!response.ok || !data.ok) {
            alert(data.error || "Неверный логин или пароль");
            return;
          }

          state.currentUser = normalizeUser(data.user);
          saveAll();
          go("profile");
          render();
          return;
        } catch (error) {
          alert("Ошибка входа через сервер");
          return;
        }
      }

      const user = state.users.find(item => item.username === username && item.password === password);

      if (!user) {
        alert("Неверный логин или пароль");
        return;
      }

      state.currentUser = normalizeUser(user);
      saveAll();
      go("profile");
      render();
    }

    async function register() {
      const username = document.getElementById("regUsername").value.trim();
      const nickname = document.getElementById("regNickname").value.trim() || username;
      const password = document.getElementById("regPassword").value;

      if (!username || !password) {
        alert("Заполни логин и пароль");
        return;
      }

      if (API_MODE) {
        try {
          const response = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, nickname, password })
          });

          const data = await response.json();

          if (!response.ok || !data.ok) {
            alert(data.error || "Не удалось зарегистрироваться");
            return;
          }

          state.currentUser = normalizeUser(data.user);
          state.users.push(state.currentUser);
          saveAll();
          go("profile");
          render();
          return;
        } catch (error) {
          alert("Ошибка регистрации через сервер");
          return;
        }
      }

      if (state.users.some(user => user.username === username)) {
        alert("Такой логин уже занят");
        return;
      }

      const user = normalizeUser({
        username,
        nickname,
        password,
        role: "user",
        elo: 1000,
        level: 1,
        wins: 0,
        losses: 0,
        matches: 0,
        xp: 0
      });

      state.users.push(user);
      state.currentUser = user;
      saveAll();
      go("profile");
      render();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function requireLogin() {

      const users = state.users
        .map(normalizeUser)
        .filter(user =>
          user.username.toLowerCase().includes(query) ||
          user.nickname.toLowerCase().includes(query) ||
          String(user.elo).includes(query)
        );

      const news = state.news.filter(item =>

    function runRuleCheck() {
      const nick = (document.getElementById("ruleNickname")?.value || "Игрок").trim();
      const text = (document.getElementById("ruleText")?.value || "").toLowerCase();
      const result = document.getElementById("ruleResult");
      if (!result) return;

      const flags = [];
      if (text.includes("чит") || text.includes("aim") || text.includes("wallhack")) flags.push("подозрение на читы");
      if (text.includes("оск") || text.includes("мат") || text.includes("токс")) flags.push("токсичное поведение");
      if (text.includes("спам") || text.includes("реклама")) flags.push("спам/реклама");
      if (text.length < 10) flags.push("мало данных");

      const verdict = flags.length ? flags.join(", ") : "нарушений не найдено";

    function exportData() {
      const payload = {
        users: state.users,
        currentUser: state.currentUser,
        tickets: state.tickets,
        news: state.news,
        matches: state.matches,
        quests: state.quests,
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "dng-data-export.json";
      link.click();
      URL.revokeObjectURL(url);
      notify("Данные экспортированы");
    }

    function clearLocalData() {
      if (!confirm("Точно очистить данные сайта в этом браузере?")) return;

        localStorage.removeItem(key);
      });

      state = {
        route: "matchmaking",
        users: loadUsers(),
        currentUser: null,
        tickets: [],
        news: defaultNews,
        matches: [],
        quests: defaultQuests,
        notifications: []

      saveAll();
      go("matchmaking");

    function runAnticheat() {
      const files = document.getElementById("acFiles");
      const behavior = document.getElementById("acBehavior");
      const status = document.getElementById("acStatus");
      const log = document.getElementById("acLog");
      let value = 0;
      if (log) log.innerHTML = "Сканирование началось...";

      const timer = setInterval(() => {
        value += 10;
        if (files) files.textContent = value + "%";
        if (behavior) behavior.textContent = Math.max(0, value - 20) + "%";
        if (log) log.innerHTML += `<br>Проверка модуля ${value}%`;
        if (value >= 100) {
          clearInterval(timer);
          if (status) status.textContent = "OK";
          if (log) log.innerHTML += "<br><b>Нарушений не найдено. Игрок допущен к матчу.</b>";
          notify("Античит: проверка пройдена");
        }
      }, 180);
    }

    margin: 16px auto 0;
    color: #aaa;
    line-height: 1.6;
  }
  .kbd {
    display: inline-flex;
    min-width: 28px;
    height: 28px;
    align-items: center;
    justify-content: center;
    margin: 2px;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 8px;
    background: rgba(255,255,255,.06);
    color: white;
    font-size: 12px;
    font-weight: 900;
  }
  .result-win { color: #86efac; }
  .result-lose { color: #fca5a5; }
  .crosshair {
    position: absolute;
    z-index: 5;
    width: 34px;
    height: 34px;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  .crosshair::before,
  .crosshair::after {
    content: "";
    position: absolute;
    background: white;
    box-shadow: 0 0 10px rgba(255,255,255,.8);
  }
  .crosshair::before {
    left: 50%;
    top: 0;
    width: 2px;
    height: 34px;
    transform: translateX(-50%);
  }
  .crosshair::after {
    top: 50%;
    left: 0;
    width: 34px;
    height: 2px;
    transform: translateY(-50%);
  }
  .music-note {
    margin-top: 8px;
    color: #9ca3af;
    font-size: 12px;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-area">
    <canvas id="game"></canvas>
    <div class="crosshair" id="crosshair"></div>
    <div class="hud">
      <div class="hud-card"><span>HP</span><b id="hp">100</b></div>
      <div class="hud-card"><span>Kills</span><b id="kills">0</b></div>
      <div class="hud-card"><span>Time</span><b id="time">60</b></div>
      <div class="hud-card"><span>Ammo</span><b id="ammo">30</b></div>
      <div class="hud-card"><span>ELO</span><b id="eloPreview">0</b></div>
    </div>
    <div class="overlay" id="startOverlay">
      <div class="overlay-card">
        <h2>DNG Aim Mission</h2>
        <p>Уничтожь нужное количество ботов до конца времени. Победа прибавит ELO, поражение снимет ELO.</p>
        <p>
          <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>
          или
          <span class="kbd">↑</span><span class="kbd">←</span><span class="kbd">↓</span><span class="kbd">→</span>
          <br />
          Мышь — прицел, ЛКМ / Space — выстрел, R — перезарядка
        </p>
        <button class="btn" id="startBtn">Начать игру</button>
        <button class="btn dark" id="closeStartBtn">Закрыть окно</button>
      </div>
    </div>
    <div class="overlay" id="resultOverlay" style="display:none;">
      <div class="overlay-card">
        <h2 id="resultTitle">Победа</h2>
        <p id="resultText"></p>
        <button class="btn" id="sendResultBtn">Забрать результат и закрыть</button>
        <button class="btn dark" id="restartBtn">Сыграть ещё раз</button>
      </div>
    </div>
  </div>
  <aside class="side-panel">
    <div class="logo">
      <div class="logo-mark">DNG</div>
      <div>
        <h1>DNG</h1>
        <p>CS2 MINI GAME</p>
      </div>
    </div>
    <div class="panel-card">
      <h2>Цель игры</h2>
      <p>Набери нужное количество убийств и выживи до конца раунда. Победа даст ELO, поражение снимет ELO.</p>
    </div>
    <div class="panel-card">
      <h2>Настройки игры</h2>
      <div class="setting">
        <label>Сложность <span id="difficultyText">Normal</span></label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
          <option value="insane">Insane</option>
        </select>
      </div>
      <div class="setting">
        <label>Скорость игрока <span id="speedText">4</span></label>
        <input id="speed" type="range" min="2" max="8" step="1" value="4" />
      </div>
      <div class="setting">
        <label>Чувствительность <span id="sensText">1.0</span></label>
        <input id="sensitivity" type="range" min="0.4" max="2.2" step="0.1" value="1" />
      </div>
      <div class="setting">
        <label>Громкость музыки <span id="volumeText">40%</span></label>
        <input id="volume" type="range" min="0" max="100" step="5" value="40" />
      </div>
      <div class="setting">
        <label>Время раунда <span id="roundText">60s</span></label>
        <input id="roundTime" type="range" min="30" max="120" step="15" value="60" />
      </div>
      <div class="setting">
        <label>Цвет прицела</label>
        <select id="crosshairColor">
          <option value="white" selected>White</option>
          <option value="#22c55e">Green</option>
          <option value="#ef4444">Red</option>
          <option value="#38bdf8">Blue</option>
          <option value="#facc15">Yellow</option>
        </select>
      </div>
      <button class="btn dark" id="musicBtn">Музыка: выкл</button>
      <p class="music-note">Музыка генерируется прямо в браузере, отдельный аудиофайл не нужен.</p>
    </div>
    <div class="panel-card">
      <h2>Управление</h2>
      <p>WASD / стрелки — движение<br />Мышь — прицел<br />ЛКМ / Space — стрелять<br />R — перезарядка</p>
    </div>
  </aside>
</div>
<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const hpEl = document.getElementById("hp");
  const killsEl = document.getElementById("kills");
  const timeEl = document.getElementById("time");
  const ammoEl = document.getElementById("ammo");
  const eloPreviewEl = document.getElementById("eloPreview");
  const startOverlay = document.getElementById("startOverlay");
  const resultOverlay = document.getElementById("resultOverlay");
  const resultTitle = document.getElementById("resultTitle");
  const resultText = document.getElementById("resultText");
  const startBtn = document.getElementById("startBtn");
  const closeStartBtn = document.getElementById("closeStartBtn");
  const sendResultBtn = document.getElementById("sendResultBtn");
  const restartBtn = document.getElementById("restartBtn");
  const difficultyInput = document.getElementById("difficulty");
  const speedInput = document.getElementById("speed");
  const sensitivityInput = document.getElementById("sensitivity");
  const volumeInput = document.getElementById("volume");
  const roundTimeInput = document.getElementById("roundTime");
  const crosshairColorInput = document.getElementById("crosshairColor");
  const musicBtn = document.getElementById("musicBtn");
  const crosshair = document.getElementById("crosshair");
  const difficultyText = document.getElementById("difficultyText");
  const speedText = document.getElementById("speedText");
  const sensText = document.getElementById("sensText");
  const volumeText = document.getElementById("volumeText");
  const roundText = document.getElementById("roundText");

  let running = false;
  let gameEnded = false;
  let lastTime = 0;
  let spawnTimer = 0;
  let shotCooldown = 0;
  let roundTimer = 60;
  let resultPayload = null;
  const keys = {};
  const mouse = { x: 0, y: 0, down: false };

  const settings = {
    difficulty: "normal",
    speed: 4,
    sensitivity: 1,
    volume: 0.4,
    roundTime: 60,
    crosshairColor: "white",
    music: false
  };

  const difficultyConfig = {
    easy: { enemySpeed: 1.1, spawnRate: 1.35, targetKills: 8, damage: 7, eloWin: 20, eloLose: -8 },
    normal: { enemySpeed: 1.55, spawnRate: 1.05, targetKills: 12, damage: 10, eloWin: 28, eloLose: -14 },
    hard: { enemySpeed: 2.05, spawnRate: 0.82, targetKills: 16, damage: 13, eloWin: 38, eloLose: -22 },
    insane: { enemySpeed: 2.65, spawnRate: 0.62, targetKills: 22, damage: 17, eloWin: 55, eloLose: -35 }
  };

  const player = { x: 300, y: 300, r: 18, hp: 100, kills: 0, ammo: 30, maxAmmo: 30, reload: 0 };
  let bullets = [];
  let enemies = [];
  let particles = [];
  let audioCtx = null;
  let musicTimer = null;

  function viewWidth() { return canvas.getBoundingClientRect().width; }
  function viewHeight() { return canvas.getBoundingClientRect().height; }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * devicePixelRatio);
    canvas.height = Math.floor(rect.height * devicePixelRatio);
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function syncSettingsText() {
    difficultyText.textContent = settings.difficulty[0].toUpperCase() + settings.difficulty.slice(1);
    speedText.textContent = settings.speed;
    sensText.textContent = settings.sensitivity.toFixed(1);
    volumeText.textContent = Math.round(settings.volume * 100) + "%";
    roundText.textContent = settings.roundTime + "s";
  }

  function updateCrosshairColor() {
    const style = document.createElement("style");
    style.textContent = \`
      .crosshair::before,
      .crosshair::after {
        background: \${settings.crosshairColor} !important;
        box-shadow: 0 0 10px \${settings.crosshairColor} !important;
      }
    \`;
    document.head.appendChild(style);
  }

  function resetGame() {
    player.x = viewWidth() / 2;
    player.y = viewHeight() / 2;
    player.hp = 100;
    player.kills = 0;
    player.ammo = player.maxAmmo;
    player.reload = 0;
    bullets = [];
    enemies = [];
    particles = [];
    roundTimer = settings.roundTime;
    spawnTimer = 0;
    shotCooldown = 0;
    running = true;
    gameEnded = false;
    resultPayload = null;
    resultOverlay.style.display = "none";
    startOverlay.style.display = "none";
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function spawnEnemy() {
    const vw = viewWidth();
    const vh = viewHeight();
    const side = Math.floor(Math.random() * 4);
    let x = 0;
    let y = 0;
    if (side === 0) { x = Math.random() * vw; y = -30; }
    else if (side === 1) { x = vw + 30; y = Math.random() * vh; }
    else if (side === 2) { x = Math.random() * vw; y = vh + 30; }
    else { x = -30; y = Math.random() * vh; }
    enemies.push({ x, y, r: 17, hp: 2, hit: 0 });
  }

  function playTone(freq, duration, volume = 0.08) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "square";
    gain.gain.value = volume * settings.volume;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    window.setTimeout(() => {
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.06);
      osc.stop(audioCtx.currentTime + duration);
    }, duration * 1000);
  }

  function playShotSound() { playTone(160, 0.06, 0.07); }

  function playReloadSound() {
    playTone(420, 0.08, 0.04);
    window.setTimeout(() => playTone(520, 0.08, 0.04), 120);
  }

  function startMusic() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (musicTimer) return;
    settings.music = true;
    musicBtn.textContent = "Музыка: вкл";
    const notes = [55, 65, 73, 82, 98, 82, 73, 65];
    let index = 0;
    musicTimer = window.setInterval(() => {
      if (!settings.music) return;
      playTone(notes[index % notes.length], 0.12, 0.035);
      index += 1;
    }, 220);
  }

  function stopMusic() {
    settings.music = false;
    musicBtn.textContent = "Музыка: выкл";
    if (musicTimer) {
      window.clearInterval(musicTimer);
      musicTimer = null;
    }
  }

  function toggleMusic() {
    if (settings.music) stopMusic();
    else startMusic();
  }

  function shoot() {
    if (!running || gameEnded) return;
    if (shotCooldown > 0) return;
    if (player.reload > 0) return;
    if (player.ammo <= 0) {
      reload();
      return;
    }
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    bullets.push({
      x: player.x + Math.cos(angle) * 22,
      y: player.y + Math.sin(angle) * 22,
      vx: Math.cos(angle) * 12 * settings.sensitivity,
      vy: Math.sin(angle) * 12 * settings.sensitivity,
      life: 80
    });
    player.ammo -= 1;
    shotCooldown = 0.13;
    playShotSound();
  }

  function reload() {
    if (player.reload > 0 || player.ammo === player.maxAmmo) return;
    player.reload = 1.1;
    playReloadSound();
  }

  function addParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 30 + Math.random() * 20,
        color
      });
    }
  }

  function endGame(win) {
    if (gameEnded) return;
    running = false;
    gameEnded = true;
    const config = difficultyConfig[settings.difficulty];
    const eloChange = win ? config.eloWin : config.eloLose;
    resultPayload = {
      type: "DNG_GAME_RESULT",
      source: "dng-cs2-minigame",
      result: win ? "win" : "lose",
      eloChange,
      kills: player.kills,
      hp: Math.max(0, Math.round(player.hp)),
      difficulty: settings.difficulty,
      mode: "CS2 Mini Game",
      createdAt: new Date().toLocaleString("ru-RU")
    };
    resultTitle.textContent = win ? "Победа" : "Поражение";
    resultTitle.className = win ? "result-win" : "result-lose";
    resultText.innerHTML = \`
      Результат: <b>\${win ? "WIN" : "LOSE"}</b><br>
      Убийств: <b>\${player.kills}</b><br>
      HP: <b>\${Math.max(0, Math.round(player.hp))}</b><br>
      Изменение ELO: <b>\${eloChange > 0 ? "+" : ""}\${eloChange}</b>
    \`;
    resultOverlay.style.display = "grid";
    eloPreviewEl.textContent = eloChange > 0 ? "+" + eloChange : eloChange;
    try { localStorage.setItem("dng_minigame_result", JSON.stringify(resultPayload)); } catch {}
    try { if (window.opener) window.opener.postMessage(resultPayload, "*"); } catch {}
  }

  function sendAndClose() {
    if (resultPayload) {
      try { localStorage.setItem("dng_minigame_result", JSON.stringify(resultPayload)); } catch {}
      try { if (window.opener) window.opener.postMessage(resultPayload, "*"); } catch {}
    }
    window.close();
  }

  function update(dt) {
    const config = difficultyConfig[settings.difficulty];
    const vw = viewWidth();
    const vh = viewHeight();
    roundTimer -= dt;
    shotCooldown = Math.max(0, shotCooldown - dt);
    if (player.reload > 0) {
      player.reload -= dt;
      if (player.reload <= 0) player.ammo = player.maxAmmo;
    }
    let mx = 0, my = 0;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;
    if (mx || my) {
      const len = Math.hypot(mx, my) || 1;
      player.x += (mx / len) * settings.speed * 90 * dt;
      player.y += (my / len) * settings.speed * 90 * dt;
    }
    player.x = clamp(player.x, 26, vw - 26);
    player.y = clamp(player.y, 26, vh - 26);
    if (mouse.down) shoot();
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = config.spawnRate;
    }
    bullets.forEach(bullet => {
      bullet.x += bullet.vx;
      bullet.y += bullet.vy;
      bullet.life -= 1;
    });
    bullets = bullets.filter(bullet => bullet.life > 0 && bullet.x > -40 && bullet.y > -40 && bullet.x < vw + 40 && bullet.y < vh + 40);
    enemies.forEach(enemy => {
      const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
      enemy.x += Math.cos(angle) * config.enemySpeed * 80 * dt;
      enemy.y += Math.sin(angle) * config.enemySpeed * 80 * dt;
      enemy.hit = Math.max(0, enemy.hit - dt);
      if (dist(enemy, player) < enemy.r + player.r) {
        player.hp -= config.damage * dt;
        enemy.hit = 0.12;
      }
    });
    bullets.forEach(bullet => {
      enemies.forEach(enemy => {
        if (dist(bullet, enemy) < enemy.r) {
          bullet.life = 0;
          enemy.hp -= 1;
          enemy.hit = 0.18;
          addParticles(enemy.x, enemy.y, "white", 5);
          if (enemy.hp <= 0) {
            player.kills += 1;
            addParticles(enemy.x, enemy.y, "#ef4444", 14);
          }
        }
      });
    });
    enemies = enemies.filter(enemy => enemy.hp > 0);
    particles.forEach(particle => {
      particle.x += particle.vx;
      particle.y += particle.vy;
      particle.life -= 1;
    });
    particles = particles.filter(particle => particle.life > 0);
    if (player.hp <= 0) endGame(false);
    if (player.kills >= config.targetKills) endGame(true);
    if (roundTimer <= 0) endGame(player.kills >= config.targetKills);
    hpEl.textContent = Math.max(0, Math.round(player.hp));
    killsEl.textContent = player.kills + "/" + config.targetKills;
    timeEl.textContent = Math.ceil(Math.max(0, roundTimer));
    ammoEl.textContent = player.reload > 0 ? "R..." : player.ammo;
    eloPreviewEl.textContent = config.eloWin + "/" + config.eloLose;
  }

  function drawPlayer() {
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(angle);
    ctx.shadowColor = "white";
    ctx.shadowBlur = 12;
    ctx.fillStyle = "#050505";
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "white";
    ctx.fillRect(6, -4, 26, 8);
    ctx.restore();
  }

  function drawEnemy(enemy) {
    ctx.save();
    ctx.translate(enemy.x, enemy.y);
    ctx.shadowColor = enemy.hit > 0 ? "white" : "#ef4444";
    ctx.shadowBlur = enemy.hit > 0 ? 18 : 10;
    ctx.fillStyle = enemy.hit > 0 ? "#fff" : "#180505";
    ctx.strokeStyle = enemy.hit > 0 ? "#fff" : "#ef4444";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, enemy.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,.75)";
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(8, 0);
    ctx.moveTo(0, -8);
    ctx.lineTo(0, 8);
    ctx.stroke();
    ctx.restore();
  }

  function draw() {
    const vw = viewWidth();
    const vh = viewHeight();
    ctx.clearRect(0, 0, vw, vh);
    ctx.save();
    ctx.globalAlpha = 0.16;
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;
    for (let x = 0; x < vw; x += 48) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, vh);
      ctx.stroke();
    }
    for (let y = 0; y < vh; y += 48) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(vw, y);
      ctx.stroke();
    }
    ctx.restore();
    bullets.forEach(bullet => {
      ctx.save();
      ctx.shadowColor = "white";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    enemies.forEach(drawEnemy);
    particles.forEach(particle => {
      ctx.save();
      ctx.globalAlpha = particle.life / 50;
      ctx.fillStyle = particle.color;
      ctx.fillRect(particle.x, particle.y, 3, 3);
      ctx.restore();
    });
    drawPlayer();
    if (player.reload > 0) {
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,.9)";
      ctx.font = "900 18px Arial";
      ctx.textAlign = "center";
      ctx.fillText("RELOADING", player.x, player.y - 38);
      ctx.restore();
    }
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  window.addEventListener("keydown", event => {
    keys[event.code] = true;
    if (event.code === "Space") {
      event.preventDefault();
      shoot();
    }
    if (event.code === "KeyR") reload();
  });
  window.addEventListener("keyup", event => { keys[event.code] = false; });
  canvas.addEventListener("mousemove", event => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = event.clientX - rect.left;
    mouse.y = event.clientY - rect.top;
    crosshair.style.left = event.clientX + "px";
    crosshair.style.top = event.clientY + "px";
  });
  canvas.addEventListener("mousedown", () => {
    mouse.down = true;
    shoot();
  });
  window.addEventListener("mouseup", () => { mouse.down = false; });
  difficultyInput.addEventListener("change", () => {
    settings.difficulty = difficultyInput.value;
    syncSettingsText();
  });
  speedInput.addEventListener("input", () => {
    settings.speed = Number(speedInput.value);
    syncSettingsText();
  });
  sensitivityInput.addEventListener("input", () => {
    settings.sensitivity = Number(sensitivityInput.value);
    syncSettingsText();
  });
  volumeInput.addEventListener("input", () => {
    settings.volume = Number(volumeInput.value) / 100;
    syncSettingsText();
  });
  roundTimeInput.addEventListener("input", () => {
    settings.roundTime = Number(roundTimeInput.value);
    syncSettingsText();
  });
  crosshairColorInput.addEventListener("change", () => {
    settings.crosshairColor = crosshairColorInput.value;
    updateCrosshairColor();
  });
  musicBtn.addEventListener("click", toggleMusic);
  startBtn.addEventListener("click", resetGame);
  closeStartBtn.addEventListener("click", () => window.close());
  sendResultBtn.addEventListener("click", sendAndClose);
  restartBtn.addEventListener("click", resetGame);
  resize();
  syncSettingsText();
  updateCrosshairColor();
  draw();
<\/script>
</body>
</html>`;
    }

    const savedResult = localStorage.getItem("dng_minigame_result");
    if (savedResult) {
      try {
        applyMiniGameResult(JSON.parse(savedResult));
      } catch {}
    }

    render();
    loadServerState();
    const DNG_LIVE_REFRESH = true;
    if (API_MODE) {
      setInterval(() => {
        if (["leaderboard", "profile", "news"].includes(state.route)) {
          loadServerState();
        }
      }, 7000);
    }
